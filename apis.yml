aid: bonneville-power-administration
name: Bonneville Power Administration
description: >-
  The Bonneville Power Administration (BPA) is a federal agency within the U.S.
  Department of Energy that markets wholesale electrical power from federal hydroelectric
  projects in the Pacific Northwest. BPA also operates and maintains about three-quarters
  of the high-voltage transmission in the Pacific Northwest. The agency provides publicly
  available GIS data, energy statistics, and operational data through its data hub and
  web services.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/bonneville-power-administration/refs/heads/main/apis.yml
created: '2024-11-25'
modified: '2026-04-19'
specificationVersion: '0.19'
tags:
