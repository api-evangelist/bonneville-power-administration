  - GIS
  - Hydroelectric
  - Pacific Northwest
  - Power
  - Transmission
  - Wind
apis:
  - aid: bonneville-power-administration:gis-data-api
    name: BPA GIS Data Hub API
    tags:
      - ArcGIS
      - GeoServices
      - GIS
      - Government
      - Geospatial
      - WFS
      - WMS
    humanURL: https://data-bpagis.hub.arcgis.com
    properties:
      - url: https://data-bpagis.hub.arcgis.com
        type: Documentation
      - url: https://data-bpagis.hub.arcgis.com/datasets/998ba568128d46c0a38e285235b55d0c_0/geoservice
        type: GeoService
    description: >-
      The BPA GIS Data Hub provides publicly available geospatial data from Bonneville
      Power Administration. The hub is built on ArcGIS and supports data downloads in
      multiple formats including CSV, KML, GeoJSON, GeoTIFF, and PNG. Developer API
      access is available through GeoServices (ArcGIS REST API), WMS (Web Map Service),
      and WFS (Web Feature Service) endpoints. Datasets include BPA service area boundaries,
      transmission infrastructure, and energy facility data.
  - aid: bonneville-power-administration:wind-solar-data
    name: BPA Wind and Solar Generation Data
    tags:
      - Energy
      - Government
      - Renewable Energy
      - Solar
      - Statistics
      - Wind
    humanURL: https://transmission.bpa.gov/business/operations/Wind/
    properties:
      - url: https://transmission.bpa.gov/business/operations/Wind/
        type: Documentation
      - url: https://transmission.bpa.gov/business/operations/Wind/twndbspt.aspx
        type: DataAPI
    description: >-
      BPA publishes real-time and historical wind and solar generation data for
      the Balancing Authority area. Data includes total wind generation, total solar
      generation, net generation, and load data available for download. The data
      is used for grid operations planning and renewable energy tracking.
